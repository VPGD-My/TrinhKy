name: Daily Backup Records

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  trigger-backup:
    runs-on: ubuntu-latest
    steps:
      - name: Call backup-records Edge Function
        run: |
          curl -X POST \
            "https://uujkzjoaxkndkpendiej.supabase.co/functions/v1/backup-records" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}'
